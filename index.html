<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইফতার মিটআপ ২০২৫</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #27ae60;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
        .details {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: left;
        }
        .btn {
            display: inline-block;
            background-color: #27ae60;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #219150;
        }
        footer {
            margin-top: 30px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- এখানে তোমার ইভেন্টের ছবি দিতে পারো -->
        <!-- <img src="image-link.jpg" alt="Iftar Banner" width="100%"> -->
        
        <h1>🌙 ইফতার মিটআপ ২০২৫</h1>
        <p>আসসালামু আলাইকুম! প্রতিবারের মতো এবারও আমরা সবাই মিলে ইফতার করার আয়োজন করেছি। আপনাদের সবাইকে আমন্ত্রণ!</p>

        <div class="details">
            <p><strong>📅 তারিখ:</strong> ২০ মার্চ, ২০২৫ (শুক্রবার)</p>
            <p><strong>⏰ সময়:</strong> বিকেল ৫:০০ টা</p>
            <p><strong>📍 স্থান:</strong> ধানমন্ডি লেক, ঢাকা</p>
            <p><strong>💰 চাঁদা:</strong> ৩০০ টাকা (জনপ্রতি)</p>
        </div>

        <a href="https://forms.google.com" class="btn" target="_blank">রেজিস্ট্রেশন করুন</a>

        <footer>
            তৈরি করেছেন: <strong>তোমার নাম</strong>
        </footer>
    </div>

</body>
</html>
